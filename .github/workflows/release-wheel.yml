name: Release Packages

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run tests
        run: python -m pytest -q

      - name: Build distributions
        run: python -m build

      - name: Smoke test built wheel
        run: |
          run_repair_loop_expect_gate() {
            set +e
            "$@"
            status=$?
            set -e
            if [ "$status" -ne 3 ]; then
              echo "Expected repair loop to exit 3 until confirmation passes, got $status" >&2
              exit 1
            fi
          }
          python -m venv /tmp/tinkerloop-smoke
          source /tmp/tinkerloop-smoke/bin/activate
          pip install dist/*.whl
          tinkerloop --version
          run_repair_loop_expect_gate tinkerloop run \
            --adapter examples/starter_target/adapter.py:create_adapter \
            --user-id demo-user \
            --scenarios examples/starter_target/scenarios \
            --report-dir /tmp/tinkerloop-starter-artifacts
          tinkerloop confirm \
            --adapter examples/starter_target/adapter.py:create_adapter \
            --user-id demo-user \
            --scenarios examples/starter_target/scenarios \
            --report-dir /tmp/tinkerloop-starter-artifacts
          run_repair_loop_expect_gate tinkerloop run \
            --adapter examples/demo_app/adapter.py:create_adapter \
            --user-id demo-user \
            --scenarios examples/demo_app/scenarios \
            --report-dir /tmp/tinkerloop-demo-artifacts
          tinkerloop confirm \
            --adapter examples/demo_app/adapter.py:create_adapter \
            --user-id demo-user \
            --scenarios examples/demo_app/scenarios \
            --report-dir /tmp/tinkerloop-demo-artifacts

      - name: Upload distributions to workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: tinkerloop-dist
          path: dist/*

      - name: Attach distributions to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: gh release upload "$RELEASE_TAG" dist/* --clobber

  publish-pypi:
    if: ${{ !github.event.release.prerelease }}
    needs: build-and-upload
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          name: tinkerloop-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
